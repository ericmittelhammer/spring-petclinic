pipeline:
  identifier: Build_ericmittelhammer_spring_petclinic_1780226367800
  name: Build spring-petclinic
  orgIdentifier: default
  projectIdentifier: default_project
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec:
              imageSpec:
                imageName: ubuntu-24
          execution:
            steps:
              - step:
                  type: Run
                  name: Compile
                  identifier: Compile
                  spec:
                    shell: Sh
                    command: ./gradlew compileJava --no-daemon
                contextType: Pipeline
              - parallel:
                  - step:
                      type: Run
                      name: Test
                      identifier: Test
                      spec:
                        shell: Sh
                        command: ./gradlew test --no-daemon
                        reports:
                          type: JUnit
                          spec:
                            paths:
                              - "**/build/test-results/test/*.xml"
                  - step:
                      type: Run
                      name: Checkstyle
                      identifier: Checkstyle
                      spec:
                        shell: Sh
                        command: ./gradlew checkstyleMain --no-daemon
                      failureStrategies:
                        - onFailure:
                            errors:
                              - AllErrors
                            action:
                              type: Ignore
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push Image
                  identifier: Build_and_Push_Image
                  spec:
                    connectorRef: account.Docker_Hub
                    repo: ericmittelhammer/petclinic
                    tags:
                      - latest
                      - <+pipeline.sequenceId>
                    caching: true
  properties:
    ci:
      codebase:
        connectorRef: account.Github_OAuth_1780225992389
        repoName: ericmittelhammer/spring-petclinic
        build: <+input>
